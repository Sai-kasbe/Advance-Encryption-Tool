{% extends 'base.html' %}

{% block title %}Reset Password - AET{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">Reset Password</h2>
        <p class="auth-subtitle">Create a new password</p>

        <form action="{{ url_for('reset_password') }}" method="POST" class="auth-form">
            <div class="form-group">
                <label for="new_password" class="form-label">New Password</label>
                <div class="password-input-wrapper">
                    <input type="password" id="new_password" name="new_password" class="form-input" placeholder="Enter new password" required>
                    <button type="button" class="show-password-toggle" onclick="togglePassword('new_password')">
                        <span class="eye-icon">👁️</span>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="confirm_password" class="form-label">Confirm Password</label>
                <div class="password-input-wrapper">
                    <input type="password" id="confirm_password" name="confirm_password" class="form-input" placeholder="Re-enter password" required>
                    <button type="button" class="show-password-toggle" onclick="togglePassword('confirm_password')">
                        <span class="eye-icon">👁️</span>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-submit">RESET PASSWORD</button>
        </form>
    </div>
</div>

<script>
function togglePassword(inputId) {
    const input = document.getElementById(inputId);
    const icon = event.currentTarget.querySelector('.eye-icon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = '🙈';
    } else {
        input.type = 'password';
        icon.textContent = '👁️';
    }
}
</script>
{% endblock %}
