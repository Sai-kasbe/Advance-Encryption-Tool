{% extends 'base.html' %}

{% block title %}Forgot Username - Advanced Encryption Tool{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">Forgot Username?</h2>
        <p class="auth-subtitle">Enter your registered email to retrieve username</p>

        <form action="{{ url_for('forgot_username') }}" method="POST" class="auth-form">
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" name="email" class="form-input" placeholder="Enter your registered email" required>
            </div>

            <button type="submit" class="btn-submit">RETRIEVE USERNAME</button>
        </form>

        <p class="auth-footer">
            Remember your username? 
            <a href="{{ url_for('login') }}" class="auth-link">Log In</a>
        </p>
    </div>
</div>
{% endblock %}
