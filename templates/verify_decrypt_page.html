{% extends 'base.html' %}

{% block title %}Verify Decryption OTP - Advanced Encryption Tool{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">Verify Decryption</h2>
        <p class="auth-subtitle">Enter OTP to decrypt your file</p>

        <form action="{{ url_for('verify_decrypt_page') }}" method="POST" class="auth-form">
            <div class="form-group">
                <label for="otp" class="form-label">OTP Code</label>
                <input type="text" id="otp" name="otp" class="form-input" placeholder="Enter 6-digit OTP" pattern="[0-9]{6}" maxlength="6" required>
            </div>

            <button type="submit" class="btn-submit">VERIFY & DECRYPT</button>
        </form>

        <p class="auth-footer">
            <a href="{{ url_for('dashboard') }}" class="auth-link">Back to Dashboard</a>
        </p>
    </div>
</div>
{% endblock %}
