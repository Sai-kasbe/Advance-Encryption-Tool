{% extends 'base.html' %}

{% block title %}Verify Password Reset OTP - AET{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">Verify OTP</h2>
        <p class="auth-subtitle">Enter the OTP sent to your email</p>

        <form action="{{ url_for('verify_forgot_password_otp') }}" method="POST" class="auth-form">
            <div class="form-group">
                <label for="otp" class="form-label">OTP Code</label>
                <input type="text" id="otp" name="otp" class="form-input" placeholder="Enter 6-digit OTP" pattern="[0-9]{6}" maxlength="6" required>
            </div>

            <button type="submit" class="btn-submit">VERIFY</button>
        </form>
    </div>
</div>
{% endblock %}
