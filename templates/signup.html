{% extends 'base.html' %}

{% block title %}Sign Up - Advanced Encryption Tool{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">Create Your Account</h2>
        <p class="auth-subtitle">Join our secure encryption platform</p>

        <form action="{{ url_for('signup') }}" method="POST" class="auth-form" id="signupForm">

            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="Enter username" required>
                <span class="validation-msg" id="username-msg"></span>
            </div>

            <!-- EMAIL WITH OTP -->
            <div class="form-group">
                <label for="email" class="form-label">Email</label>

                <div style="display:flex; gap:10px; align-items:flex-start;">
                    <input type="email" id="email" name="email" class="form-input" placeholder="Enter your email" required style="flex:1;">
                    <button type="button" class="btn-submit" id="sendEmailOTP" style="width:auto;padding:14px 20px;font-size:14px;">Send OTP</button>
                </div>

                <span class="validation-msg" id="email-msg"></span>
            </div>

            <!-- OTP INPUT -->
            <div class="form-group" id="emailOtpWrap" style="display:none;">
                <label for="emailOTP" class="form-label">📧 Email OTP</label>

                <div style="display:flex; gap:10px; align-items:center;">
                    <input type="text" id="emailOTP" maxlength="6" class="form-input"
                    placeholder="Enter 6-digit OTP"
                    style="width:150px;text-align:center;font-size:20px;font-weight:700;letter-spacing:5px;">

                    <span id="emailOtpStatus" style="font-size:24px;"></span>
                    <span id="emailTimer" style="color:var(--accent-1);font-weight:700;"></span>
                </div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>

                <div class="password-input-wrapper">
                    <input type="password" id="password" name="password" class="form-input" placeholder="Enter password" required>
                    <button type="button" class="show-password-toggle" onclick="togglePassword('password')">
                        <span class="eye-icon">👁️</span>
                    </button>
                </div>

                <span class="validation-msg" id="password-msg"></span>
                <div class="password-strength" id="password-strength"></div>
            </div>

            <div class="form-group">
                <label for="confirm_password" class="form-label">Confirm Password</label>

                <div class="password-input-wrapper">
                    <input type="password" id="confirm_password" name="confirm_password" class="form-input" placeholder="Re-enter password" required>
                    <button type="button" class="show-password-toggle" onclick="togglePassword('confirm_password')">
                        <span class="eye-icon">👁️</span>
                    </button>
                </div>

                <span class="validation-msg" id="confirm-msg"></span>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn" disabled>CREATE ACCOUNT</button>

        </form>

        <p class="auth-footer">
            Already have an account?
            <a href="{{ url_for('login') }}" class="auth-link">Log In</a>
        </p>

    </div>
</div>

<script>

const username = document.getElementById('username');
const email = document.getElementById('email');
const password = document.getElementById('password');
const confirmPassword = document.getElementById('confirm_password');
const submitBtn = document.getElementById('submitBtn');

let validations = {
    username:false,
    email:false,
    emailOtp:false,
    password:false,
    confirm:false
};

username.addEventListener('input', function(){

    const value=this.value.trim();
    const msg=document.getElementById('username-msg');

    if(value.length<3){
        msg.textContent='❌ Username must be at least 3 characters';
        validations.username=false;
    }else if(!/^[a-zA-Z]+$/.test(value)){
        msg.textContent='❌ Only letters allowed';
        validations.username=false;
    }else{
        msg.textContent='✅ Valid username';
        validations.username=true;
    }

    checkFormValidity();
});

email.addEventListener('input',function(){

    const value=this.value.trim();
    const msg=document.getElementById('email-msg');
    const emailRegex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if(emailRegex.test(value)){
        msg.textContent='✅ Valid email';
        validations.email=true;
    }else{
        msg.textContent='❌ Invalid email';
        validations.email=false;
    }

    checkFormValidity();

});

password.addEventListener('input',function(){

    const value=this.value;
    const msg=document.getElementById('password-msg');

    if(value.length<8){
        msg.textContent='❌ Password must be at least 8 characters';
        validations.password=false;
    }else{
        msg.textContent='✅ Strong password';
        validations.password=true;
    }

    checkFormValidity();
    checkPasswordMatch();

});

confirmPassword.addEventListener('input',checkPasswordMatch);

function checkPasswordMatch(){

    const msg=document.getElementById('confirm-msg');

    if(password.value!==confirmPassword.value){
        msg.textContent='❌ Passwords do not match';
        validations.confirm=false;
    }else{
        msg.textContent='✅ Passwords match';
        validations.confirm=true;
    }

    checkFormValidity();

}

function checkFormValidity(){

    const allValid=Object.values(validations).every(v=>v===true);

    submitBtn.disabled=!allValid;

}

function togglePassword(inputId){

    const input=document.getElementById(inputId);

    input.type=input.type==="password"?"text":"password";

}

let emailInterval;

function startTimer(seconds){

    let remaining=seconds;
    const timer=document.getElementById('emailTimer');

    timer.textContent=`(${remaining}s)`;

    const interval=setInterval(()=>{

        remaining--;
        timer.textContent=`(${remaining}s)`;

        if(remaining<=0){
            clearInterval(interval);
            timer.textContent='Expired ❌';
        }

    },1000);

    return interval;

}

document.getElementById('sendEmailOTP').addEventListener('click',function(){

    const emailValue=email.value.trim();

    if(!validations.email){
        alert("Enter valid email");
        return;
    }

    const btn=this;
    btn.disabled=true;
    btn.textContent="Sending...";

    fetch('/api/send_email_otp',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email:emailValue})
    })

    .then(async response=>{

        let data;

        try{
            data=await response.json();
        }catch{
            throw new Error("Server returned invalid response");
        }

        return data;

    })

    .then(data=>{

        if(data.sent){

            document.getElementById('emailOtpWrap').style.display='block';
            validations.emailOtp=false;

            if(emailInterval) clearInterval(emailInterval);

            emailInterval=startTimer(120);

            alert("OTP sent to email");

        }else{

            alert(data.error || "OTP failed");

        }

        btn.disabled=false;
        btn.textContent="Resend OTP";

    })

    .catch(err=>{

        alert("Server error: "+err.message);

        btn.disabled=false;
        btn.textContent="Send OTP";

    });

});

document.getElementById('emailOTP').addEventListener('input',function(){

    const otp=this.value.trim();

    if(otp.length!==6) return;

    fetch('/api/verify_email_otp',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({otp})
    })

    .then(async response=>{

        let data;

        try{
            data=await response.json();
        }catch{
            throw new Error("Invalid response");
        }

        return data;

    })

    .then(data=>{

        const status=document.getElementById('emailOtpStatus');

        if(data.valid){

            status.textContent='✅';
            validations.emailOtp=true;

            if(emailInterval) clearInterval(emailInterval);

            document.getElementById('emailTimer').textContent="Verified ✅";

        }else{

            status.textContent='❌';
            validations.emailOtp=false;

        }

        checkFormValidity();

    })

    .catch(err=>{
        alert("OTP verification failed");
    });

});

</script>

{% endblock %}
