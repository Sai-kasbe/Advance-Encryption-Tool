{% extends 'base.html' %}

{% block title %}Download Decrypted File - AET{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">✅ Decryption Successful!</h2>
        <p class="auth-subtitle">Your file has been decrypted successfully</p>

        <div style="text-align: center; margin: 30px 0;">
            <svg style="width: 80px; height: 80px; color: #10b981;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
        </div>

        <div style="background: #f8f9fa; padding: 20px; border-radius: 10px; margin: 20px 0;">
            <p style="margin: 0; color: #4a4a4a;">
                <strong>Original Filename:</strong><br>
                {{ filename }}
            </p>
        </div>

        <a href="{{ url_for('dashboard') }}" class="btn-submit" style="display: block; text-align: center; text-decoration: none;">
            BACK TO DASHBOARD
        </a>
    </div>
</div>
{% endblock %}
